<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDK 自动提炼工具</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --container-bg: #161b22;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --border-color: #30363d;
            --btn-primary-bg: #238636;
            --btn-primary-hover: #2ea043;
            --btn-primary-text: #ffffff;
            --btn-secondary-bg: #21262d;
            --btn-secondary-hover: #30363d;
            --input-bg: #0d1117;
            --focus-ring: #58a6ff;
            --success-color: #3fb950;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.5;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1200px; /* 增加宽度以适应双栏 */
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 32px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }

        h2 {
            margin-top: 0;
            font-size: 24px;
            font-weight: 600;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        
        h2 svg {
            fill: var(--text-primary);
        }

        p {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 24px;
        }

        /* 设置栏 */
        .options-bar {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(13, 17, 23, 0.5);
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
        }

        .options-bar label {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        select {
            background-color: var(--input-bg);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 6px 32px 6px 12px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            appearance: none;
            cursor: pointer;
            /* 模拟下拉箭头 */
            background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%238b949e' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M6 9l6 6 6-6'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 8px center;
        }

        select:focus {
            border-color: var(--focus-ring);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.3);
        }

        select option {
            background-color: var(--bg-color);
            color: var(--text-primary);
        }

        /* 双栏布局 */
        .split-layout {
            display: flex;
            gap: 24px;
            flex-wrap: wrap; /* 移动端适配 */
        }

        .pane {
            flex: 1;
            min-width: 300px; /* 防止缩太窄 */
            display: flex;
            flex-direction: column;
        }

        .pane-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            height: 32px; /* 保持标题栏高度对齐 */
        }

        textarea, .result-box {
            width: 100%;
            flex: 1; /* 撑满剩余高度 */
            min-height: 400px;
            background-color: var(--input-bg);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px;
            font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        textarea {
            resize: none; /* 固定高度不让拖拽，由容器决定 */
        }

        textarea:focus {
            outline: none;
            border-color: var(--focus-ring);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.3);
        }

        textarea::placeholder {
            color: #484f58;
        }

        .result-box {
            overflow-y: auto;
            word-break: break-all;
            white-space: pre-wrap;
        }

        .result-box.has-content {
            border-color: var(--btn-primary-bg);
        }

        /* 按钮样式 */
        button {
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 14px;
            font-weight: 500;
            line-height: 20px;
        }

        button.primary {
            background-color: var(--btn-primary-bg);
            color: var(--btn-primary-text);
            border: 1px solid rgba(240, 246, 252, 0.1);
            padding: 8px 16px;
            width: 100%; /* 输入列底部的按钮拉伸 */
            margin-top: 16px;
        }

        button.primary:hover {
            background-color: var(--btn-primary-hover);
        }

        button.secondary {
            background-color: var(--btn-secondary-bg);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 4px 12px;
            font-size: 13px;
        }

        button.secondary:hover {
            background-color: var(--btn-secondary-hover);
            border-color: #8b949e;
        }

        button.secondary svg {
            fill: var(--text-secondary);
        }
        
        button.secondary:hover svg {
            fill: var(--text-primary);
        }

    </style>
</head>
<body>
    <div class="container">
        <h2>
            <svg width="24" height="24" viewBox="0 0 16 16" version="1.1" aria-hidden="true"><path fill-rule="evenodd" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>
            CDK 自动提炼工具
        </h2>
        
        <p>粘贴包含 CDK 的杂乱文本（备注、游戏名等），工具将自动提取 5x5 格式的 CDK 并进行去重：</p>
        
        <!-- 顶部格式选项 -->
        <div class="options-bar">
            <label for="format-select">输出格式：</label>
            <select id="format-select" onchange="extractCDK()">
                <option value="comma">英文逗号分隔 (CDK1,CDK2)</option>
                <option value="newline">每行一个 (CDK1回车CDK2)</option>
                <option value="space">空格分隔 (CDK1 CDK2)</option>
                <option value="semicolon">英文分号分隔 (CDK1;CDK2)</option>
            </select>
        </div>

        <div class="split-layout">
            <!-- 左侧：输入区 -->
            <div class="pane flex-col">
                <div class="pane-header">数据来源</div>
                <textarea id="input" placeholder="将文本粘贴到这里... (例如: 感谢您的购买 12345-ABCDE-12345-ABCDE-12345)" oninput="extractCDK()"></textarea>
                <button class="primary" onclick="extractCDK()">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path fill-rule="evenodd" d="M11.5 7a4.499 4.499 0 11-8.998 0A4.499 4.499 0 0111.5 7zm-.82 4.74a6 6 0 111.06-1.06l3.04 3.04a.75.75 0 11-1.06 1.06l-3.04-3.04z"></path></svg>
                    提取并去重
                </button>
            </div>

            <!-- 右侧：输出区 -->
            <div class="pane flex-col">
                <div class="pane-header">
                    <span>提取结果：<span id="count" style="color:var(--text-primary);font-weight:bold;margin-left:4px;">0</span> 个</span>
                    <button class="secondary" onclick="copyResult()" id="copy-btn">
                        <svg width="16" height="16" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 010 1.5h-1.5a.25.25 0 00-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 00.25-.25v-1.5a.75.75 0 011.5 0v1.5A1.75 1.75 0 019.25 16h-7.5A1.75 1.75 0 010 14.25v-7.5z"></path><path fill-rule="evenodd" d="M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0114.25 11h-7.5A1.75 1.75 0 015 9.25v-7.5zm1.75-.25a.25.25 0 00-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 00.25-.25v-7.5a.25.25 0 00-.25-.25h-7.5z"></path></svg>
                        <span id="copy-text">复制结果</span>
                    </button>
                </div>
                <!-- 结果框变为类似textarea的可滚动区域，以保持与左侧等高 -->
                <div class="result-box" id="result">等待提取...</div>
            </div>
        </div>
    </div>

    <script>
        let currentResult = "";

        function extractCDK() {
            const text = document.getElementById('input').value;
            const regex = /[A-Z0-9]{5}-[A-Z0-9]{5}-[A-Z0-9]{5}-[A-Z0-9]{5}-[A-Z0-9]{5}/gi;
            const matches = text.match(regex);
            
            const resultBox = document.getElementById('result');
            const countSpan = document.getElementById('count');
            const format = document.getElementById('format-select').value;

            if (matches) {
                const uniqueCDKs = [...new Set(matches.map(s => s.toUpperCase()))];
                
                // 根据选项拼接字符串
                if (format === 'comma') {
                    currentResult = uniqueCDKs.join(',');
                } else if (format === 'newline') {
                    currentResult = uniqueCDKs.join('\n');
                } else if (format === 'space') {
                    currentResult = uniqueCDKs.join(' ');
                } else if (format === 'semicolon') {
                    currentResult = uniqueCDKs.join(';');
                }

                resultBox.innerText = currentResult;
                resultBox.classList.add('has-content');
                countSpan.innerText = uniqueCDKs.length;
            } else {
                currentResult = "";
                resultBox.innerText = "未找到符合条件的 CDK";
                resultBox.classList.remove('has-content');
                countSpan.innerText = 0;
            }
            
            // 重置复制按钮状态
            document.getElementById('copy-text').innerText = "复制结果";
        }

        function copyResult() {
            if (!currentResult) {
                alert('没有可复制的提取结果哦');
                return;
            }
            navigator.clipboard.writeText(currentResult).then(() => {
                const btnText = document.getElementById('copy-text');
                btnText.innerText = "已复制!";
                setTimeout(() => {
                    btnText.innerText = "复制结果";
                }, 2000);
            }).catch(err => {
                alert('复制失败，请手动选择复制');
            });
        }
    </script>
</body>
</html>
